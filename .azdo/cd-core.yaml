# =============================================================================
# This pipeline (BotCore-CD) builds, tests, and packs the core/ project.
# PR trigger: main and release/* branches (core/** paths only).
# CI trigger: main and release/* branches (core/** paths only).
# Pushes packages to the TeamsSDKPreviews internal feed when the
# PushToADOFeed pipeline variable is set to true.
# =============================================================================

pr:
  branches:
    include:
      - main
      - release/*
  paths:
    include:
      - core/**

trigger:
  branches:
    include:
    - main
    - release/*
  paths:
    include:
    - core/**

pool:
  vmImage: 'ubuntu-22.04'

stages:
- stage: Build_Test_Pack
  jobs:
  - job: BuildTestPack
    displayName: 'Build, Test, and Pack'
    steps:

      - task: UseDotNet@2
        displayName: 'Use .NET 8 SDK'
        inputs:
          packageType: 'sdk'
          version: '8.0.x'

      - task: UseDotNet@2
        displayName: 'Use .NET 10 SDK'
        inputs:
          packageType: 'sdk'
          version: '10.0.x'

      - script: dotnet restore 
        displayName: 'Restore'
        workingDirectory: '$(Build.SourcesDirectory)/core'

      - script: dotnet build --no-restore --configuration Release
        displayName: 'Build'
        workingDirectory: '$(Build.SourcesDirectory)/core'

      - script: dotnet test --no-build --configuration Release
        displayName: 'Test'
        workingDirectory: '$(Build.SourcesDirectory)/core'

      - script: dotnet pack --no-build -o $(Build.ArtifactStagingDirectory) /p:SymbolPackageFormat=snupkg --configuration Release
        displayName: 'Pack'
        workingDirectory: '$(Build.SourcesDirectory)/core'

      - task: NuGetCommand@2
        displayName: 'Push NuGet Packages'
        condition: and(succeeded(), eq(variables['PushToADOFeed'], 'true'))
        inputs:
          command: push
          packagesToPush: '$(Build.ArtifactStagingDirectory)/*.nupkg'
          nuGetFeedType: internal
          publishVstsFeed: '$(System.TeamProject)/TeamsSDKPreviews'

      - task: PublishPipelineArtifact@1
        displayName: 'Publish NuGet Packages as Pipeline Artifact'
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)'
          artifact: 'Packages'
          publishLocation: 'pipeline'